<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shibal's To Do List</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div class="container">
        <div class="todo-header">
            <h1>📝 My To-Do List</h1>
            <p class="subtitle">Keep track of what matters</p>
        </div>
        
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="What do you need to do?" class="task-input" autocomplete="off" aria-label="New task input">
            <button id="addBtn" class="add-btn" aria-label="Add new task">➕ Add</button>
        </div>
        
        <div class="task-stats">
            <div class="stat-item stat-item-1">
                <span class="stat-label">Total Tasks:</span>
                <span class="stat-value" id="totalTasks">0</span>
            </div>
            <div class="stat-item stat-item-2">
                <span class="stat-label">Completed:</span>
                <span class="stat-value" id="completedTasks">0</span>
            </div>
        </div>
        
        <ul id="taskList" class="task-list" role="list">
            <!-- Tasks will be added here dynamically -->
        </ul>
    </div>
    
    <script src="todo.js"></script>
</body>
</html>
